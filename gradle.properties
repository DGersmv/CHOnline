# Project-wide Gradle settings.
# SSL «Tag mismatch» при скачивании: см. комментарии в истории — антивирус/Defender, TLS 1.2.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djdk.tls.client.protocols=TLSv1.2 -Dhttps.protocols=TLSv1.2
systemProp.jdk.tls.client.protocols=TLSv1.2
systemProp.https.protocols=TLSv1.2
kotlin.compiler.runViaBuildToolsApi=false
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
